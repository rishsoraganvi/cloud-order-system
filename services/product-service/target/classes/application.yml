spring:
  application:
    name: product-service
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: jdbc:postgresql://localhost:5433/product_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

server:
  port: 8002
