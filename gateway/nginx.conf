# API Gateway Configuration
# Routes client requests to microservices (User, Product, Order)
# Applies rate limiting and sets proxy headers

# Run nginx in foreground (for Docker)
daemon off;

# Worker processes (auto = number of CPU cores)
worker_processes auto;

# Error log
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ========== RATE LIMITING ==========
    # Token bucket algorithm: 10 requests per second per client IP
    # 10m zone size allows ~160,000 IP addresses (10MB / 64 bytes per entry)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ========== UPSTREAM DEFINITIONS ==========
    # Service hostnames resolve via Docker Compose internal DNS

    upstream user_service {
        server user-service:8001;
    }

    upstream product_service {
        server product-service:8002;
    }

    upstream order_service {
        server order-service:8003;
    }

    # ========== SERVER BLOCK ==========
    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        server_name _;

        # Root location for health checks
        location / {
            return 200 "API Gateway is running\n";
            add_header Content-Type text/plain;
        }

        # ========== USER SERVICE ROUTING ==========
        # Routes: /api/users/* -> user-service:8001/users/*
        location /api/users/ {
            # Apply rate limiting
            limit_req zone=api_limit burst=20 nodelay;

            # Proxy configuration
            proxy_pass http://user_service/users/;

            # Essential proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # Preserve original request body
            proxy_request_buffering on;
        }

        # ========== PRODUCT SERVICE ROUTING ==========
        # Routes: /api/products/* -> product-service:8002/products/*
        location /api/products/ {
            # Apply rate limiting
            limit_req zone=api_limit burst=20 nodelay;

            # Proxy configuration
            proxy_pass http://product_service/products/;

            # Essential proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # Preserve original request body
            proxy_request_buffering on;
        }

        # ========== ORDER SERVICE ROUTING ==========
        # Routes: /api/orders/* -> order-service:8003/orders/*
        location /api/orders/ {
            # Apply rate limiting
            limit_req zone=api_limit burst=20 nodelay;

            # Proxy configuration
            proxy_pass http://order_service/orders/;

            # Essential proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # Preserve original request body
            proxy_request_buffering on;
        }

        # ========== HEALTH CHECK ENDPOINTS ==========
        # Individual service health checks for monitoring
        location /health/users {
            proxy_pass http://user_service/health;
            proxy_read_timeout 5s;
        }

        location /health/products {
            proxy_pass http://product_service/health;
            proxy_read_timeout 5s;
        }

        location /health/orders {
            proxy_pass http://order_service/health;
            proxy_read_timeout 5s;
        }

        location /health/notifications {
            # Forward to notification service if added
            proxy_pass http://notification-service:8004/health;
            proxy_read_timeout 5s;
        }

        # ========== 404 HANDLING ==========
        location ~ ^/api/ {
            return 404 '{"error":"API endpoint not found"}\n';
            add_header Content-Type application/json;
        }
    }
}
